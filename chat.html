<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanti</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap');

        :root {
            --neon: #b347ff;
            --neon2: #00f0ff;
            --neon3: #ff2d78;
            --bg: #070711;
            --bg2: #0d0d1a;
            --bg3: #12122a;
            --border: rgba(179,71,255,0.25);
            --text: #e0d4ff;
            --muted: #6b5f8a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(179,71,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(179,71,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: relative;
            padding: 0;
            z-index: 10;
            flex-shrink: 0;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: linear-gradient(180deg, #0d0020 0%, var(--bg2) 100%);
            border-bottom: 1px solid var(--border);
        }

        .header-inner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon), var(--neon2), var(--neon3), var(--neon), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-hex {
            width: 42px;
            height: 42px;
            position: relative;
            flex-shrink: 0;
        }

        .logo-hex svg { width: 100%; height: 100%; }

        .logo-text h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
            animation: glitch 8s infinite;
        }

        @keyframes glitch {
            0%, 92%, 100% { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); clip-path: none; transform: none; }
            93% { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 0); text-shadow: 2px 0 var(--neon3); }
            94% { clip-path: inset(60% 0 10% 0); transform: translate(2px, 0); text-shadow: -2px 0 var(--neon2); }
            95% { clip-path: none; transform: none; text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); }
        }

        .logo-text p {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat {
            text-align: center;
        }

        .stat-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: var(--neon2);
        }

        .stat-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Wake Word Overlay ── */
        #ww-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(7,7,17,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--neon);
            box-shadow: inset 0 0 80px rgba(179,71,255,0.1);
        }

        .ww-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 30px var(--neon);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: ringpulse 1s ease-in-out infinite;
            font-size: 2.5rem;
        }

        @keyframes ringpulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--neon); }
            50% { transform: scale(1.1); box-shadow: 0 0 60px var(--neon), 0 0 100px var(--neon); }
        }

        #ww-label {
            margin-top: 20px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 4px;
            color: var(--neon);
            font-size: 0.9rem;
        }

        /* ── Chat ── */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1;
            position: relative;
        }

        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 2px; }

        .msg {
            max-width: 72%;
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a0030, #0d001f);
            border: 1px solid var(--neon);
            border-radius: 12px 2px 12px 12px;
            color: #e8d5ff;
        }

        .user::after {
            content: '';
            position: absolute;
            top: -1px; right: -1px;
            width: 8px; height: 8px;
            background: var(--neon);
        }

        .chanti {
            align-self: flex-start;
            background: linear-gradient(135deg, #001a2a, #000d1a);
            border: 1px solid var(--neon2);
            border-radius: 2px 12px 12px 12px;
            color: #d0f4ff;
        }

        .chanti::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 8px; height: 8px;
            background: var(--neon2);
        }

        .msg-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--neon2);
        }

        .msg-time {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
        }

        .user .name { color: var(--neon); }
        .user .msg-time { color: var(--muted); }

        .thinking {
            align-self: flex-start;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 2px;
            padding: 8px 16px;
        }

        .thinking::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 100% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        /* Markdown styles inside chat */
        .chanti p { margin: 4px 0; }
        .chanti ul, .chanti ol { padding-left: 20px; margin: 4px 0; }
        .chanti code { background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.2); padding: 1px 5px; border-radius: 3px; font-family: 'Share Tech Mono', monospace; font-size: 0.85em; }
        .chanti strong { color: var(--neon2); font-weight: 600; }

        /* ── Input Area ── */
        #inputarea {
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            z-index: 10;
            position: relative;
            flex-shrink: 0;
        }

        #inputarea::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon2), transparent);
        }

        #input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        #input::placeholder { color: var(--muted); }

        #input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 12px rgba(179,71,255,0.2);
        }

        #send {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        #send::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--neon);
            transform: translateX(-100%);
            transition: transform 0.2s;
            z-index: -1;
        }

        #send:hover { color: #000; }
        #send:hover::before { transform: translateX(0); }
        #send:disabled { opacity: 0.3; cursor: not-allowed; }
        #send:disabled::before { transform: translateX(-100%); }
        #send:disabled:hover { color: var(--neon); }

        #statusbar {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 1px;
            padding: 0 4px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo-area">
                <div class="logo-hex">
                    <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="21,2 38,11 38,31 21,40 4,31 4,11" fill="none" stroke="#b347ff" stroke-width="1.5"/>
                        <polygon points="21,8 33,14.5 33,27.5 21,34 9,27.5 9,14.5" fill="rgba(179,71,255,0.08)" stroke="#00f0ff" stroke-width="0.8"/>
                        <circle cx="21" cy="21" r="5" fill="none" stroke="#b347ff" stroke-width="1.5"/>
                        <circle cx="21" cy="21" r="2" fill="#b347ff"/>
                        <line x1="21" y1="8" x2="21" y2="16" stroke="#b347ff" stroke-width="0.8" opacity="0.6"/>
                        <line x1="21" y1="26" x2="21" y2="34" stroke="#b347ff" stroke-width="0.8" opacity="0.6"/>
                        <line x1="9" y1="14.5" x2="16" y2="18.5" stroke="#b347ff" stroke-width="0.8" opacity="0.6"/>
                        <line x1="26" y1="23.5" x2="33" y2="27.5" stroke="#b347ff" stroke-width="0.8" opacity="0.6"/>
                        <line x1="33" y1="14.5" x2="26" y2="18.5" stroke="#b347ff" stroke-width="0.8" opacity="0.6"/>
                        <line x1="16" y1="23.5" x2="9" y2="27.5" stroke="#b347ff" stroke-width="0.8" opacity="0.6"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>CHANTI</h1>
                    <p>PERSONAL AI SYSTEM v2.0</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-val" id="msg-count">0</div>
                    <div class="stat-label">MESSAGES</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="clock">--:--</div>
                    <div class="stat-label">LOCAL TIME</div>
                </div>
                <div class="status-dot" id="status-dot"></div>
            </div>
        </div>
    </header>

    <div id="ww-overlay">
        <div class="ww-ring">🎤</div>
        <div id="ww-label">LISTENING...</div>
    </div>

    <div id="chat"></div>

    <div id="inputarea">
        <span id="statusbar">OFFLINE</span>
        <input id="input" type="text" placeholder="EINGABE_" autocomplete="off"/>
        <button id="send" disabled>SENDEN</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const statusbar = document.getElementById('statusbar');
        const statusDot = document.getElementById('status-dot');
        const msgCount = document.getElementById('msg-count');
        const clockEl = document.getElementById('clock');
        let count = 0;

        function updateClock() {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }
        updateClock();
        setInterval(updateClock, 1000);

        const ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onopen = () => {
            statusbar.textContent = 'VERBUNDEN //';
            statusDot.style.background = '#00ff88';
            statusDot.style.boxShadow = '0 0 8px #00ff88';
            send.disabled = false;
        };

        ws.onclose = () => {
            statusbar.textContent = 'VERBINDUNG GETRENNT';
            statusDot.style.background = '#ff2d78';
            statusDot.style.boxShadow = '0 0 8px #ff2d78';
            send.disabled = true;
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const thinking = document.getElementById('thinking');
            if (thinking) thinking.remove();

            if (data.type === 'message') {
                addMessage('chanti', data.text);
                send.disabled = false;
                input.focus();
            } else if (data.type === 'transcript') {
                addMessage('user', data.text);
                addThinking();
            } else if (data.type === 'wakeword') {
                const overlay = document.getElementById('ww-overlay');
                const label = document.getElementById('ww-label');
                if (data.event === 'listening') {
                    overlay.style.display = 'flex';
                    label.textContent = 'LISTENING...';
                } else if (data.event === 'transcript') {
                    addMessage('user', data.text);
                } else if (data.event === 'processing') {
                    label.textContent = 'PROCESSING...';
                    addThinking();
                } else if (data.event === 'responding') {
                    overlay.style.display = 'none';
                    if (data.text) addMessage('chanti', data.text);
                } else {
                    overlay.style.display = 'none';
                }
            }
        };

        function getTime() {
            return new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            const time = getTime();
            if (role === 'chanti') {
                const rendered = typeof marked !== 'undefined' ? marked.parse(text) : text;
                div.innerHTML = `<div class="msg-header"><span class="name">// CHANTI</span><span class="msg-time">${time}</span></div>${rendered}`;
            } else {
                div.innerHTML = `<div class="msg-header"><span class="name">// YOU</span><span class="msg-time">${time}</span></div><span>${text}</span>`;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            count++;
            msgCount.textContent = count;
        }

        function addThinking() {
            const div = document.createElement('div');
            div.className = 'thinking';
            div.id = 'thinking';
            div.textContent = '// PROCESSING';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            addThinking();
            ws.send(JSON.stringify({type: 'text', text}));
            input.value = '';
            send.disabled = true;
        }

        send.onclick = sendMessage;
        input.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
